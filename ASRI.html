<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASR الجدول التفاعلي</title>
  <!-- Google Font & Tailwind (CDN for single file) -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide icons via CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Motion (framer-motion port for React) not needed: we use vanilla CSS + lucide -->
  <style>
    * {
      font-family: 'Cairo', sans-serif;
    }
    body {
      background: #050B14;
      color: white;
      direction: rtl;
    }
    /* Glass panel effect */
    .glass-panel {
      background: rgba(28, 37, 65, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(72, 202, 228, 0.2);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    /* Custom transitions */
    .slide-enter {
      animation: slideFade 0.3s ease forwards;
    }
    @keyframes slideFade {
      0% { opacity: 0; transform: translateY(8px); filter: blur(2px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .banner-enter {
      animation: bannerPop 0.25s ease;
    }
    @keyframes bannerPop {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    /* tab slider */
    .group-slider {
      transition: right 0.3s ease-out;
    }
    /* Hide default number input spinner */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.6;
      cursor: pointer;
    }
    input[type="date"] {
      color-scheme: dark;
    }
  </style>
</head>
<body class="bg-[#050B14] text-white antialiased selection:bg-cyan-500/30 min-h-screen pb-12">

  <!-- React-like root: we'll render with vanilla JS but keep structure identical -->
  <div id="root"></div>

  <script>
    (function() {
      // ---------- DATA ----------
      const scheduleData = [
        { id: 'sunday', name: 'الأحد', morning: [
            { id: 'mc7', name: 'MC7 – Hygiène et sécurité', type: 'common' },
            { id: 'mc9', name: 'MC9 – Protection du consommateur', type: 'common' }
          ], afternoon: [] },
        { id: 'monday', name: 'الاثنين', morning: [
            { id: 'mc10', name: 'MC10 – Bureautique et Internet', type: 'alternating' }
          ], afternoon: [
            { id: 'mq1-1', name: 'MQ1 – Système d’exploitation Windows', type: 'alternating' }
          ] },
        { id: 'tuesday', name: 'الثلاثاء', morning: [
            { id: 'mc1', name: 'MC1 – Structure Machine', type: 'common' }
          ], afternoon: [
            { id: 'mq1-2', name: 'MQ1 – Système d’exploitation Windows', type: 'alternating' }
          ] },
        { id: 'wednesday', name: 'الأربعاء', morning: [
            { id: 'mq2', name: 'MQ2 – Système d’exploitation Linux', type: 'alternating' }
          ], afternoon: [
            { id: 'mc4', name: 'MC4 – Programmation Script et DevNet', type: 'alternating' }
          ] },
        { id: 'thursday', name: 'الخميس', morning: [
            { id: 'mc3', name: 'MC3 – Anglais', type: 'common' },
            { id: 'mc2', name: 'MC2 – Technique d’expression', type: 'common' },
            { id: 'mc5', name: 'MC5 – Cryptographie', type: 'common' }
          ], afternoon: [] }
      ];

      // ---------- UTILS ----------
      function getWeekNumber(startDate, targetDate) {
        const start = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
        const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
        const diffInTime = target.getTime() - start.getTime();
        const diffInDays = Math.floor(diffInTime / (1000 * 3600 * 24));
        if (diffInDays < 0) return Math.floor(diffInDays / 7);
        return Math.floor(diffInDays / 7) + 1;
      }

      function isGroupStudyingAlternating(group, weekNumber) {
        if (weekNumber <= 0) return false;
        const isEvenWeek = weekNumber % 2 === 0;
        return group === 1 ? isEvenWeek : !isEvenWeek;
      }

      function formatDate(date) {
        return date.toLocaleDateString('ar-DZ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }

      function addWeeks(date, weeks) {
        const d = new Date(date);
        d.setDate(d.getDate() + weeks * 7);
        return d;
      }

      // ---------- STATE & PERSISTENCE ----------
      let startDateStr = localStorage.getItem('semesterStartDate');
      if (!startDateStr) {
        const now = new Date();
        const day = now.getDay(); // 0 sun, 1 mon... in arabic locale sunday is 0
        const diff = now.getDate() - day; // go to last sunday
        const lastSunday = new Date(now.setDate(diff));
        startDateStr = lastSunday.toISOString().split('T')[0];
      }
      
      let group = 1; // 1 or 2
      let viewDate = new Date(); // current date
      let isSettingsOpen = false;
      let tempDate = startDateStr;

      // references to DOM
      const rootEl = document.getElementById('root');
      
      // helper to render
      function render() {
        if (!rootEl) return;
        
        const startDate = new Date(startDateStr);
        const weekNumber = getWeekNumber(startDate, viewDate);
        const alternatingStudy = isGroupStudyingAlternating(group, weekNumber);

        // ---- build html string ----
        let html = `
          <!-- header -->
          <header class="glass-panel sticky top-0 z-30 border-b border-white/10" style="background:#0B132B/80">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                  <i data-lucide="graduation-cap" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                  <h1 class="font-bold text-lg md:text-xl leading-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400">ASRi Schedule</h1>
                  <p class="text-xs text-gray-400 hidden md:block">Administration et Sécurité des Réseaux</p>
                </div>
              </div>
              <div class="flex items-center gap-4">
                <div class="hidden md:flex flex-col items-end">
                  <span class="text-sm font-medium text-gray-200">${formatDate(new Date())}</span>
                </div>
                <button id="settingsBtn" class="p-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 transition-colors">
                  <i data-lucide="settings" class="w-5 h-5 text-gray-300"></i>
                </button>
              </div>
            </div>
          </header>

          <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
            <!-- controls section -->
            <div class="flex flex-col md:flex-row gap-6 items-center justify-between mb-8 glass-panel bg-white/5 border-white/10 p-4 md:p-6 rounded-2xl">
              <!-- group selector -->
              <div class="w-full md:w-auto flex flex-col gap-2">
                <label class="text-sm text-gray-400 font-medium flex items-center gap-2"><i data-lucide="users" class="w-4 h-4"></i> اختر الفوج</label>
                <div class="flex p-1 bg-black/40 rounded-xl border border-white/5 w-full md:w-64 relative" id="groupContainer">
                  <div id="groupSlider" class="absolute inset-y-1 w-[calc(50%-4px)] bg-gradient-to-r from-cyan-600 to-blue-600 rounded-lg shadow-md group-slider" style="right: ${group === 1 ? '4px' : 'calc(50%)'};"></div>
                  <button id="group1Btn" class="flex-1 py-2 text-sm font-bold z-10 transition-colors ${group === 1 ? 'text-white' : 'text-gray-400 hover:text-gray-200'}">الفوج الأول</button>
                  <button id="group2Btn" class="flex-1 py-2 text-sm font-bold z-10 transition-colors ${group === 2 ? 'text-white' : 'text-gray-400 hover:text-gray-200'}">الفوج الثاني</button>
                </div>
              </div>
              <!-- week navigation -->
              <div class="w-full md:w-auto flex flex-col items-center md:items-end gap-2">
                <div class="flex items-center gap-3 bg-black/40 rounded-xl border border-white/5 p-1">
                  <button id="nextWeekBtn" class="p-2 rounded-lg hover:bg-white/10 transition-colors" title="الأسبوع القادم"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                  <div class="flex flex-col items-center min-w-[140px]">
                    <span class="text-sm font-bold text-cyan-400">الأسبوع ${weekNumber > 0 ? weekNumber : '-'}</span>
                    <span class="text-xs text-gray-400">${weekNumber > 0 ? (weekNumber % 2 === 0 ? 'أسبوع زوجي' : 'أسبوع فردي') : 'قبل السداسي'}</span>
                  </div>
                  <button id="prevWeekBtn" class="p-2 rounded-lg hover:bg-white/10 transition-colors" title="الأسبوع السابق"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                </div>
                <button id="currentWeekBtn" class="text-xs text-cyan-400 hover:text-cyan-300 underline underline-offset-4 transition-colors">العودة للأسبوع الحالي</button>
              </div>
            </div>

            <!-- status banner -->
            <div id="banner" class="mb-8 p-4 rounded-xl border flex items-center gap-3 banner-enter ${alternatingStudy ? 'bg-cyan-900/20 border-cyan-500/30 text-cyan-100' : 'bg-purple-900/20 border-purple-500/30 text-purple-100'}">
              <i data-lucide="calendar-days" class="w-5 h-5 flex-shrink-0"></i>
              <p class="text-sm md:text-base font-medium">
                نحن في <strong class="font-bold">الأسبوع ${weekNumber > 0 ? weekNumber : '-'}</strong> من السداسي. 
                ${weekNumber > 0 ? `الفوج ${group} <strong>${alternatingStudy ? 'يدرس' : 'لا يدرس'}</strong> حصص التناوب هذا الأسبوع.` : ''}
              </p>
            </div>

            <!-- schedule display: grid (large) + accordion (small) -->
            <div id="scheduleContainer" class="slide-enter">
              <!-- large screen grid (hidden on mobile) -->
              <div class="hidden lg:block w-full overflow-x-auto pb-8">
                <div class="min-w-[1000px] grid grid-cols-6 gap-4">
                  <div class="col-span-1"></div>
                  ${scheduleData.map(day => `<div class="text-center py-3 glass-panel rounded-xl bg-white/5 border-white/10"><h3 class="font-bold text-lg text-white">${day.name}</h3></div>`).join('')}

                  <!-- morning row -->
                  <div class="col-span-1 flex flex-col items-center justify-center glass-panel rounded-xl bg-white/5 border-white/10 p-4">
                    <i data-lucide="sun" class="w-8 h-8 text-yellow-400 mb-2"></i>
                    <span class="font-bold text-lg">صباحاً</span>
                    <span class="text-xs text-gray-400 mt-1">08:00 - 12:00</span>
                  </div>
                  ${scheduleData.map(day => {
                    const sessions = day.morning;
                    if (sessions.length) {
                      return `<div class="flex flex-col gap-3">${sessions.map(s => sessionCard(s, group, weekNumber, alternatingStudy)).join('')}</div>`;
                    } else {
                      return `<div class="glass-panel bg-white/5 border-white/5 p-4 rounded-xl h-full min-h-[100px] flex items-center justify-center"><span class="text-gray-500 text-sm">فراغ</span></div>`;
                    }
                  }).join('')}

                  <!-- afternoon row -->
                  <div class="col-span-1 flex flex-col items-center justify-center glass-panel rounded-xl bg-white/5 border-white/10 p-4 mt-4">
                    <i data-lucide="moon" class="w-8 h-8 text-indigo-400 mb-2"></i>
                    <span class="font-bold text-lg">مساءً</span>
                    <span class="text-xs text-gray-400 mt-1">13:00 - 17:00</span>
                  </div>
                  ${scheduleData.map(day => {
                    const sessions = day.afternoon;
                    if (sessions.length) {
                      return `<div class="flex flex-col gap-3 mt-4">${sessions.map(s => sessionCard(s, group, weekNumber, alternatingStudy)).join('')}</div>`;
                    } else {
                      return `<div class="glass-panel bg-white/5 border-white/5 p-4 rounded-xl h-full min-h-[100px] flex items-center justify-center mt-4"><span class="text-gray-500 text-sm">فراغ</span></div>`;
                    }
                  }).join('')}
                </div>
              </div>

              <!-- mobile accordion (visible only under lg) -->
              <div class="lg:hidden flex flex-col gap-3 w-full">
                ${scheduleData.map(day => {
                  const isOpen = false; // we handle with dynamic open/close via js, but we'll render always closed first, then attach events? better: we generate static but use js to toggle.
                  // We'll generate a wrapper with a unique id and let js handle open/close state. For simplicity, we make them all closed by default, but we add a click handler.
                  // We'll generate the basic structure and later we attach events to toggle .hidden class on content.
                  return `
                    <div class="glass-panel rounded-xl overflow-hidden bg-white/5 border-white/10 day-accordion" data-day-id="${day.id}">
                      <button class="accordion-trigger w-full flex items-center justify-between p-4 bg-white/5 hover:bg-white/10 transition-colors">
                        <h3 class="font-bold text-lg text-white">${day.name}</h3>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-gray-400 accordion-icon transition-transform duration-200"></i>
                      </button>
                      <div class="accordion-content hidden border-t border-white/10">
                        <div class="p-4 flex flex-col gap-6">
                          <div>
                            <div class="flex items-center gap-2 mb-3"><i data-lucide="sun" class="w-5 h-5 text-yellow-400"></i><h4 class="font-bold text-gray-200">صباحاً</h4></div>
                            <div class="flex flex-col gap-3">
                              ${day.morning.length ? day.morning.map(s => sessionCard(s, group, weekNumber, alternatingStudy)).join('') : '<div class="p-3 rounded-lg bg-white/5 border border-white/5 text-center"><span class="text-gray-500 text-sm">فراغ</span></div>'}
                            </div>
                          </div>
                          <div>
                            <div class="flex items-center gap-2 mb-3"><i data-lucide="moon" class="w-5 h-5 text-indigo-400"></i><h4 class="font-bold text-gray-200">مساءً</h4></div>
                            <div class="flex flex-col gap-3">
                              ${day.afternoon.length ? day.afternoon.map(s => sessionCard(s, group, weekNumber, alternatingStudy)).join('') : '<div class="p-3 rounded-lg bg-white/5 border border-white/5 text-center"><span class="text-gray-500 text-sm">فراغ</span></div>'}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </main>

          <!-- footer -->
          <footer class="mt-16 border-t border-white/10 py-8 text-center">
            <p class="text-gray-500 text-sm">تم التصميم لتخصص Administration et Sécurité des Réseaux informatique</p>
          </footer>
        `;

        // settings modal if open
        if (isSettingsOpen) {
          html += `
            <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40" id="modalOverlay"></div>
            <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md z-50 p-4">
              <div class="glass-panel bg-[#0B132B]/90 border-cyan-500/30 p-6 rounded-2xl shadow-2xl">
                <div class="flex items-center justify-between mb-6">
                  <h2 class="text-xl font-bold text-white flex items-center gap-2"><i data-lucide="calendar" class="w-5 h-5 text-cyan-400"></i> إعدادات السداسي</h2>
                  <button id="closeModalBtn" class="text-gray-400 hover:text-white transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="mb-6">
                  <label class="block text-sm font-medium text-gray-300 mb-2">تاريخ بداية السداسي</label>
                  <input type="date" id="dateInput" value="${tempDate}" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-colors">
                  <p class="text-xs text-gray-400 mt-2">يستخدم هذا التاريخ لحساب رقم الأسبوع ونظام التناوب تلقائياً.</p>
                </div>
                <button id="saveSettingsBtn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-cyan-500/20"><i data-lucide="save" class="w-5 h-5"></i> حفظ الإعدادات</button>
              </div>
            </div>
          `;
        }

        rootEl.innerHTML = html;
        lucide.createIcons(); // replace icons

        // ---------- attach event listeners ----------
        document.getElementById('settingsBtn')?.addEventListener('click', () => {
          tempDate = startDateStr; // sync
          isSettingsOpen = true;
          render();
        });

        if (isSettingsOpen) {
          document.getElementById('modalOverlay')?.addEventListener('click', closeModal);
          document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
          document.getElementById('saveSettingsBtn')?.addEventListener('click', () => {
            const newDate = document.getElementById('dateInput').value;
            startDateStr = newDate;
            localStorage.setItem('semesterStartDate', newDate);
            isSettingsOpen = false;
            render();
          });
        }

        function closeModal() {
          isSettingsOpen = false;
          render();
        }

        document.getElementById('group1Btn')?.addEventListener('click', () => {
          group = 1;
          render();
        });
        document.getElementById('group2Btn')?.addEventListener('click', () => {
          group = 2;
          render();
        });
        document.getElementById('nextWeekBtn')?.addEventListener('click', () => {
          viewDate = addWeeks(viewDate, 1);
          render();
        });
        document.getElementById('prevWeekBtn')?.addEventListener('click', () => {
          viewDate = addWeeks(viewDate, -1);
          render();
        });
        document.getElementById('currentWeekBtn')?.addEventListener('click', () => {
          viewDate = new Date();
          render();
        });

        // accordion toggles (mobile)
        document.querySelectorAll('.accordion-trigger').forEach(trigger => {
          trigger.addEventListener('click', (e) => {
            const accordion = trigger.closest('.day-accordion');
            const content = accordion.querySelector('.accordion-content');
            const icon = trigger.querySelector('.accordion-icon');
            content.classList.toggle('hidden');
            // rotate icon
            if (icon) {
              if (content.classList.contains('hidden')) {
                icon.style.transform = 'rotate(0deg)';
              } else {
                icon.style.transform = 'rotate(180deg)';
              }
            }
          });
        });
      }

      // helper to generate session card
      function sessionCard(session, group, weekNumber, isStudying) {
        if (session.type === 'alternating' && !isStudying) {
          return `<div class="glass-panel bg-gray-800/40 border-gray-700/50 p-4 rounded-xl flex items-center justify-center h-full min-h-[100px]"><p class="text-gray-400 text-sm text-center font-medium">لا توجد حصة لهذا الفوج هذا الأسبوع</p></div>`;
        }
        const isAlt = session.type === 'alternating';
        const bgClass = isAlt ? 'bg-gradient-to-br from-purple-900/60 to-indigo-900/60 border-purple-500/30' : 'bg-gradient-to-br from-blue-900/60 to-cyan-900/60 border-cyan-500/30';
        const textClass = isAlt ? 'text-purple-100' : 'text-cyan-100';
        const badgeClass = isAlt ? 'bg-purple-500/20 text-purple-300' : 'bg-cyan-500/20 text-cyan-300';
        return `
          <div class="glass-panel p-4 rounded-xl h-full min-h-[100px] flex flex-col justify-between transition-all duration-300 hover:scale-[1.02] hover:-translate-y-1 ${bgClass}">
            <h4 class="font-bold text-sm md:text-base leading-snug ${textClass}">${session.name}</h4>
            <div class="mt-3 flex items-center justify-between">
              <span class="text-[10px] md:text-xs px-2 py-1 rounded-full font-semibold ${badgeClass}">${isAlt ? 'بالتناوب' : 'مشتركة'}</span>
            </div>
          </div>
        `;
      }

      // initial render
      render();
    })();
  </script>
</body>
</html>
